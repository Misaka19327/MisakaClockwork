stages:
    - release

release-composer:
    stage: release

    script:
        - echo "Publishing Composer package for tag: $CI_COMMIT_TAG"

        - |
            curl --fail-with-body \
              --request POST \
              --header "JOB-TOKEN: $CI_JOB_TOKEN" \
              --data "tag=$CI_COMMIT_TAG" \
              "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/composer"

    rules:
        - if: '$CI_COMMIT_TAG'